<!DOCTYPE html>
<html lang="it" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anistream - Accesso Riservato</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: #1a1a1a;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 100%;
            max-width: 350px;
        }
        h1 {
            color: #a855f7;
            margin-bottom: 2rem;
            font-weight: 800;
            letter-spacing: 1px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            background: #2a2a2a;
            border: 1px solid #333;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #a855f7;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #a855f7;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #9333ea;
        }
        .error {
            color: #fc8181;
            background: rgba(252, 129, 129, 0.1);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.9em;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Anistream</h1>
        <div class="error" id="errorMsg">Credenziali non valide! Ritenta.</div>
        <form action="/do-login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Entra nello Stream</button>
        </form>
    </div>
    <script>
        if (window.location.search.includes('error=1')) {
            document.getElementById('errorMsg').style.display = 'block';
        }
    </script>
</body>
</html>
